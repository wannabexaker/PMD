limit_req_zone $binary_remote_addr zone=pmd_api_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=pmd_actuator_limit:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=pmd_conn_limit:10m;

server {
  listen 80;
  server_name _;
  server_tokens off;
  client_max_body_size 5m;
  set $backend_upstream backend:8080;
  limit_conn pmd_conn_limit 40;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_min_length 1024;

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Resource-Policy "same-origin" always;
  add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none'; object-src 'none'" always;
  # TLS-ready: enable when TLS is terminated directly by this nginx instance.
  # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  proxy_hide_header X-Powered-By;
  proxy_connect_timeout 5s;
  proxy_send_timeout 60s;
  proxy_read_timeout 60s;

  location /api/ {
    limit_req zone=pmd_api_limit burst=20 nodelay;
    proxy_pass http://$backend_upstream/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Connection "";
  }

  location /actuator/ {
    limit_req zone=pmd_actuator_limit burst=5 nodelay;
    proxy_pass http://$backend_upstream/actuator/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Connection "";
  }

  location /uploads/ {
    limit_req zone=pmd_api_limit burst=10 nodelay;
    proxy_pass http://$backend_upstream/uploads/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Connection "";
  }

  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable" always;
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri $uri/ /index.html;
  }
}
