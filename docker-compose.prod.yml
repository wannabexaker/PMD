services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    command: ["mongod", "--auth", "--bind_ip_all"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:?MONGO_INITDB_ROOT_USERNAME must be set}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD must be set}
      PMD_MONGO_APP_DB: ${PMD_MONGO_APP_DB:-pmd}
      PMD_MONGO_APP_USER: ${PMD_MONGO_APP_USER:?PMD_MONGO_APP_USER must be set}
      PMD_MONGO_APP_PASSWORD: ${PMD_MONGO_APP_PASSWORD:?PMD_MONGO_APP_PASSWORD must be set}
    volumes:
      - mongo_data:/data/db
      - ./scripts/mongo/init/01-init-pmd-user.sh:/docker-entrypoint-initdb.d/01-init-pmd-user.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --username \"$${MONGO_INITDB_ROOT_USERNAME}\" --password \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\" | grep 1 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - data

  backend:
    image: ghcr.io/${GHCR_OWNER:-your-org}/pmd-backend:latest
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker,prod}
      SPRING_DATA_MONGODB_URI: ${SPRING_DATA_MONGODB_URI:-mongodb://${PMD_MONGO_APP_USER}:${PMD_MONGO_APP_PASSWORD}@mongo:27017/${PMD_MONGO_APP_DB:-pmd}?authSource=${PMD_MONGO_APP_DB:-pmd}}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-mail}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-1025}
      PMD_MAIL_FROM: ${PMD_MAIL_FROM:-no-reply@pmd.local}
      PMD_JWT_SECRET: ${PMD_JWT_SECRET:?PMD_JWT_SECRET must be set for production compose}
      PMD_JWT_EXPIRATIONSECONDS: ${PMD_JWT_EXPIRATIONSECONDS:-900}
      PMD_AUTH_SESSION_COOKIE_SECURE: ${PMD_AUTH_SESSION_COOKIE_SECURE:-true}
      PMD_AUTH_REQUIRE_VERIFIED_EMAIL: ${PMD_AUTH_REQUIRE_VERIFIED_EMAIL:-true}
      PMD_SECURITY_TRUST_PROXY_HEADERS: ${PMD_SECURITY_TRUST_PROXY_HEADERS:-true}
      PMD_ALLOWED_ORIGINS: ${PMD_ALLOWED_ORIGINS:?PMD_ALLOWED_ORIGINS must be set for production}
      PMD_ALLOWED_ORIGIN_PATTERNS: ${PMD_ALLOWED_ORIGIN_PATTERNS:-}
      SERVER_PORT: 8080
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - uploads:/app/uploads
    networks:
      - app
      - data

  frontend:
    image: ghcr.io/${GHCR_OWNER:-your-org}/pmd-frontend:latest
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - edge
      - app
    ports:
      - "${PMD_FRONTEND_PORT:-80}:80"

  mailhog:
    image: mailhog/mailhog:latest
    profiles: ["debug"]
    restart: unless-stopped
    ports:
      - "${PMD_SMTP_PORT:-1025}:1025"
      - "${PMD_MAILHOG_UI_PORT:-8025}:8025"
    networks:
      - app

volumes:
  mongo_data:
  uploads:

networks:
  edge:
  app:
    internal: true
  data:
    internal: true
