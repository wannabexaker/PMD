server:
  port: 8099

spring:
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/pmd}
pmd:
  jwt:
    secret: ${PMD_JWT_SECRET:local-dev-only-not-secret-change-me-0123456789}
  auth:
    session:
      secure-cookie: false
      require-verified-email: false
  security:
    rate-limit:
      per-minute: ${PMD_RATE_LIMIT_PER_MINUTE:600}
      per-hour: ${PMD_RATE_LIMIT_PER_HOUR:12000}
