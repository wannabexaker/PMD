spring:
  application:
    name: pmd-backend
  profiles:
    default: local

  servlet:
    multipart:
      # Must stay >= the client-side limit in the upload UIs (2MB), otherwise a file
      # that passes the browser check is rejected here with a confusing error.
      max-file-size: ${PMD_UPLOAD_MAX_FILE_SIZE:4MB}
      max-request-size: ${PMD_UPLOAD_MAX_REQUEST_SIZE:8MB}

  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

pmd:
  app:
    # Public origin of the SPA; used to build clickable links in emails.
    # Override per-environment (e.g. https://pmd.example.com) — a wrong value
    # makes confirm-email and notification CTA links unreachable.
    base-url: ${PMD_APP_BASE_URL:http://localhost:5173}
  audit:
    retention:
      days: ${PMD_AUDIT_RETENTION_DAYS:365}
  uploads:
    # Comment attachments are the one unbounded upload path and the real disk-fill risk on the
    # Pi's SD card. Disabled until a per-user/per-workspace storage quota exists.
    attachments-enabled: ${PMD_UPLOADS_ATTACHMENTS_ENABLED:false}
    rate-limit:
      # Files one account may upload per hour. Generous for avatar changes, far too low to fill
      # the disk by scripting the endpoint.
      per-hour: ${PMD_UPLOADS_RATE_LIMIT_PER_HOUR:20}
  mail:
    from: no-reply@pmd.local
  jwt:
    expirationSeconds: ${PMD_JWT_EXPIRATIONSECONDS:900}
  auth:
    session:
      cookie-name: ${PMD_AUTH_SESSION_COOKIE_NAME:PMD_RT}
      cookie-path: ${PMD_AUTH_SESSION_COOKIE_PATH:/api/auth}
      same-site: ${PMD_AUTH_SESSION_COOKIE_SAME_SITE:Lax}
      secure-cookie: ${PMD_AUTH_SESSION_COOKIE_SECURE:false}
      remember-ttl-seconds: ${PMD_AUTH_SESSION_REMEMBER_TTL_SECONDS:2592000}
      session-ttl-seconds: ${PMD_AUTH_SESSION_TTL_SECONDS:86400}
      inactivity-ttl-seconds: ${PMD_AUTH_SESSION_INACTIVITY_TTL_SECONDS:604800}
      revoked-retention-seconds: ${PMD_AUTH_SESSION_REVOKED_RETENTION_SECONDS:2592000}
      max-sessions-per-user: ${PMD_AUTH_MAX_SESSIONS_PER_USER:10}
      require-verified-email: ${PMD_AUTH_REQUIRE_VERIFIED_EMAIL:false}
  security:
    trust-proxy-headers: ${PMD_SECURITY_TRUST_PROXY_HEADERS:false}
    # Comma-separated emails allowed to hold isAdmin. Blank disables the startup sweep.
    admin-emails: ${PMD_SECURITY_ADMIN_EMAILS:}
    client-metadata:
      store-raw: ${PMD_SECURITY_CLIENT_METADATA_STORE_RAW:false}
      hash-salt: ${PMD_SECURITY_CLIENT_METADATA_HASH_SALT:}
    allowed-origins: ${PMD_ALLOWED_ORIGINS:http://localhost,http://localhost:5173,http://127.0.0.1,http://127.0.0.1:5173}
    allowed-origin-patterns: ${PMD_ALLOWED_ORIGIN_PATTERNS:http://localhost,http://localhost:*,http://127.0.0.1,http://127.0.0.1:*,http://192.168.*,http://192.168.*:*,http://10.*,http://10.*:*,http://172.*,http://172.*:*,http://*.local,http://*.local:*}
    auth-rate-limit:
      ip-per-10-min: ${PMD_AUTH_RATE_LIMIT_IP_PER_10_MIN:40}
      user-per-10-min: ${PMD_AUTH_RATE_LIMIT_USER_PER_10_MIN:12}
      lock-minutes: ${PMD_AUTH_RATE_LIMIT_LOCK_MINUTES:15}
    rate-limit:
      per-minute: ${PMD_RATE_LIMIT_PER_MINUTE:180}
      per-hour: ${PMD_RATE_LIMIT_PER_HOUR:3000}

server:
  port: 8080
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

management:
  cloudfoundry:
    enabled: false  # Security: mitigation for CVE-2026-22733 (Auth Bypass via CloudFoundry Actuator endpoints)
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    SECURITY: WARN
